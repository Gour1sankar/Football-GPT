services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./data:/app/data

  frontend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install streamlit requests --quiet &&
             streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000